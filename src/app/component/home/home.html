<ng-container *ngIf="(homeState$ | async) as state">
<ng-container>

     <app-navbar [user]="state?.appData?.data?.user"></app-navbar>
     <app-stats [stats]="state?.appData?.data?.stats"></app-stats>

    <section>
      <div class="container">

        <div class="row mt-3">

          <!-- Progress -->
          <div class="progress">
            <div
              class="progress-bar bg-success"
              role="progressbar"
              aria-valuenow="5"
              aria-valuemin="0"
              aria-valuemax="100"
              style="width: 5%;">
              5%
            </div>
          </div>

          <!-- Title -->
          <div class="col">
            <h4 class="fw-bold text-start">
              Customers
            </h4>
          </div>

          <!-- Add Icon -->
          <div class="col">
            <h4 class="fw-bold text-end">
              <i
                style="cursor:pointer;color:green;font-size:30px;"
                class="bi bi-file-earmark-plus">
              </i>
            </h4>
          </div>

          <!-- Table -->
          <div class="col-xl-12">

            <table class="table table-hover">

              <thead>
              <tr>
                <th class="text-center" scope="col">ID</th>
                <th scope="col">Photo</th>
                <th scope="col">Name</th>
                <th scope="col">Email</th>
                <th scope="col">Phone</th>
                <th scope="col">Status</th>
                <th scope="col">Type</th>
                <th scope="col">Action</th>
              </tr>
              </thead>
              <tbody class="table-body">
              <tr *ngFor="let customer of state?.appData?.data?.page.content" class="cell-1">
                <th class="text-center">
                  {{ customer?.id }}
                </th>
                <td>
                  <img [src]="customer.imageUrl" [alt]="customer.name" width="42" height="42" class="rounded-circle">
                </td>
                <td>
                  {{ customer?.name }}
                </td>
                <td>{{ customer?.email }}</td>
                <td>{{ customer.phone }}</td>
                <td>
                  <span class="badge"
                  [ngClass]="[customer.status === 'ACTIVE'?'bg-success':'',
                  customer.status === 'PENDING'?'bg-primary':'',
                  customer.status === 'BANNED'?'bg-danger':'',
                  customer.status === 'INACTIVE'?'bg-info':'']">
                    {{ customer.status }}
                  </span>
                </td>
                <td>
                  {{ customer.type }}
                </td>
                <td>
                  <button type="button" class="btn btn-info"
                  [routerLink]="['/customers',customer.id]">

                    View
                  </button>
<!--                  <button type="button" class="btn btn-info"-->
<!--                          (click)="selectCustomer(customer)">-->
<!--                    View-->
<!--                  </button>-->
                </td>
              </tr>
              </tbody>
            </table>
            <!-- Pagination -->
            <nav *ngIf="state?.appData?.data?.page.content.length>0" arai-label="page navigation example">
              <ul class="pagination justify-content-end">
                <li [ngClass]="0 === (currentPage$ | async) ? 'disable':''" class="page-item pointer">
                  <a (click)="goToNextOrPreviousPage('backward')" class="page-link">
                    &laquo; Prev
                  </a>
                </li>
                <li  *ngFor="let pageNumber of [].constructor( state?.appData?.data?.page.totalPages); let i = index" class="page-item pointer">
                  <a (click)="goToPage(i)" [ngClass]="i == (currentPage$ | async) ? 'active':''" class="page-link">
                    {{ i+1 }}
                  </a>
                </li>
                <li [ngClass]="(state?.appData?.data?.page.totalPages - 1 )!=(currentPage$ | async)?'':'disable'" class="page-item pointer">
                  <a (click)="goToNextOrPreviousPage('forward')" class="page-link">
                    Next &raquo;
                  </a>
                </li>

              </ul>
            </nav>

          </div>

        </div>

      </div>
    </section>

  </ng-container>
</ng-container>
